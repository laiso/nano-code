<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>作って学ぶ AIエージェント サポートサイト</title>
    <style>
      :root {
        --bg: #ffffff;
        --surface: #f8fbff;
        --text: #1f2937;
        --muted: #4b5563;
        --accent: #0066cc;
        --accent-soft: #e6f0ff;
        --border: #d7e3f3;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.8;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 56px 24px 40px;
      }
      .hero, section, footer {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 28px;
      }
      .hero {
        display: grid;
        gap: 24px;
        align-items: center;
        grid-template-columns: minmax(0, 220px) minmax(0, 1fr);
      }
      .hero h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3.1rem);
        line-height: 1.2;
      }
      p { margin: 0; }
      a {
        color: var(--accent);
      }
      .badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 700;
        margin-bottom: 16px;
      }
      .cover {
        width: 200px;
        max-width: 100%;
        display: block;
        border-radius: 12px;
        border: 1px solid var(--border);
        box-shadow: 0 10px 24px rgba(0, 102, 204, 0.12);
      }
      .grid {
        display: grid;
        gap: 20px;
        margin-top: 24px;
      }
      h2 { margin: 0 0 16px; color: var(--accent); }
      ul {
        padding-left: 20px;
        margin: 0;
      }
      .chapters li { margin-bottom: 10px; }
      .chapter {
        color: var(--accent);
        font-weight: 700;
      }
      footer {
        margin-top: 20px;
      }
      .footer-grid {
        display: grid;
        gap: 12px;
      }
      .footer-note {
        color: var(--muted);
      }
      @media (max-width: 640px) {
        .hero {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="hero">
        <a href="https://gihyo.jp/book/2026/978-4-297-15565-0">
          <img class="cover" src="images/cover.jpg" alt="書籍『作って学ぶ AIエージェント』の書影" />
        </a>
        <div>
          <div class="badge">Support Site</div>
          <h1>作って学ぶ AIエージェント サポートサイト</h1>
          <p>このサイトは書籍「作って学ぶ AIエージェント ── TypeScriptとLLMで切り拓くAI時代のエンジニアリング」（laiso 著、技術評論社刊）のサポートサイトです</p>
          <p><a href="https://gihyo.jp/book/2026/978-4-297-15565-0">技術評論社の書籍ページを見る</a></p>
        </div>
      </div>

      <div class="grid">
        <section>
          <h2>補足情報</h2>
          <ul class="chapters">
            <li><span class="chapter">7.4節</span>：補足情報 1</li>
            <li><span class="chapter">7.7節</span>：補足情報 2</li>
            <li><span class="chapter">7.2節</span>：補足情報 3</li>
          </ul>
        </section>
      </div>

      <footer>
        <div class="footer-grid">
          <div>書籍情報：ISBN: 978-4-297-15565-0</div>
          <div><a href="https://gihyo.jp/book/2026/978-4-297-15565-0">技術評論社の書籍ページ</a></div>
          <div class="footer-note">このサイトは Nano Code（本書で作成するコーディングエージェント）によって構築されました</div>
        </div>
      </footer>
    </main>
  </body>
</html>
