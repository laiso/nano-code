<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>作って学ぶ AIエージェント サポートサイト</title>
    <style>
      :root {
        --bg: #ffffff;
        --surface: #f7faff;
        --text: #1f2937;
        --muted: #4b5563;
        --accent: #0066cc;
        --accent-soft: #e6f0ff;
        --border: #d9e3f0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
        background: linear-gradient(180deg, #ffffff 0%, #f5f9ff 100%);
        color: var(--text);
        line-height: 1.8;
      }
      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 64px 24px 40px;
      }
      .hero, section, footer {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 12px 30px rgba(0, 102, 204, 0.08);
      }
      .hero {
        background: linear-gradient(180deg, #ffffff 0%, var(--surface) 100%);
      }
      .hero h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4vw, 3.25rem);
      }
      .hero p, li, footer { color: var(--muted); }
      .badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 700;
        margin-bottom: 16px;
      }
      .grid {
        display: grid;
        gap: 20px;
        margin-top: 24px;
      }
      h2 { margin-top: 0; color: var(--accent); }
      ul {
        padding-left: 20px;
        margin: 0;
      }
      .chapters li { margin-bottom: 10px; }
      .chapter {
        color: var(--accent);
        font-weight: 700;
      }
      footer {
        margin-top: 20px;
        text-align: center;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="hero">
        <div class="badge">Support Site</div>
        <h1>作って学ぶ AIエージェント サポートサイト</h1>
        <p>
          書籍「作って学ぶ AIエージェント ── TypeScriptとLLMで切り拓くAI時代のエンジニアリング」
          （laiso 著、技術評論社刊）のサポートサイトです。
        </p>
      </div>

      <div class="grid">
        <section>
          <h2>補足情報</h2>
          <ul class="chapters">
            <li><span class="chapter">7.4節</span>：補足情報 1</li>
            <li><span class="chapter">7.7節</span>：補足情報 2</li>
            <li><span class="chapter">7.2節</span>：補足情報 3</li>
          </ul>
        </section>
      </div>

      <footer>
        書籍情報：ISBN 978-4-297-15565-0
      </footer>
    </main>
  </body>
</html>
